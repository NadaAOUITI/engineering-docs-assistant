# Local stack: PostgreSQL + pgvector, Redis, FastAPI, Celery worker.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: engineering_docs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d engineering_docs"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Isolated Postgres for pytest (port 5433) so host Postgres on 5432 does not break tests.
  db-test:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: engineering_docs_test
    ports:
      - "5433:5432"
    volumes:
      - pgdata_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d engineering_docs_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@db:5432/engineering_docs
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: change-me-in-production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      GROQ_API_KEY: ""
      EMBEDDING_MODEL_NAME: sentence-transformers/all-mpnet-base-v2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    command: celery -A app.worker.tasks:celery_app worker -l info
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@db:5432/engineering_docs
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: change-me-in-production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      GROQ_API_KEY: ""
      EMBEDDING_MODEL_NAME: sentence-transformers/all-mpnet-base-v2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata:
  pgdata_test:
