name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: engineering_docs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d engineering_docs_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Match Dockerfile: CPU-only PyTorch (avoids multi-GB CUDA wheels in CI).
      PIP_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu
      TEST_DATABASE_URL: postgresql+psycopg://app:app@localhost:5432/engineering_docs_test
      DATABASE_URL: postgresql+psycopg://app:app@localhost:5432/engineering_docs_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-test-secret
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      GROQ_API_KEY: ""
      EMBEDDING_MODEL_NAME: sentence-transformers/all-mpnet-base-v2
      PYTHONPATH: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Cache pip and model
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/huggingface
          key: ${{ runner.os }}-deps-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify imports
        run: python -c "from app.main import app; assert app.title"

      - name: Run tests
        run: pytest tests/ -v
